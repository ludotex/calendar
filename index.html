<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Schedule</title>

<style>
body { font-family: Arial,sans-serif; margin:0; padding:10px; background:#b0b0b0; }
.container { max-width:900px; margin:auto; }

h1 { text-align:center; }

.card {
  background:white;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

select {
  width:100%;
  padding:8px;
  border-radius:8px;
}

/* Lock toggle switch */
.switch-container { display:flex; align-items:center; margin-bottom:10px; gap:10px; }
.switch-label { font-size:14px; font-weight:bold; }
.switch {
  position: relative;
  display: inline-block;
  width:50px;
  height:24px;
}
.switch input { display:none; }
.slider {
  position:absolute;
  cursor:pointer;
  top:0; left:0; right:0; bottom:0;
  background:#ccc;
  border-radius:24px;
  transition:.4s;
}
.slider:before {
  position:absolute;
  content:"";
  height:18px;
  width:18px;
  left:3px;
  bottom:3px;
  background:white;
  border-radius:50%;
  transition:.4s;
}
input:checked + .slider { background:#ef4444; }
input:checked + .slider:before { transform:translateX(26px); }

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* Calendar grid with extra column for week numbers */
.calendar {
  display:grid;
  grid-template-columns:28px repeat(7,1fr); /* first column is week number */
  gap:2px;
}

.day {
  height:50px;
  background:white;
  border-radius:6px;
  position:relative;
  cursor:pointer;
  user-select:none;
}

.day-number {
  position:absolute;
  top:2px;
  left:4px;
  font-size:12px;
  font-weight:bold;
}

.weekday-row {
  display:grid;
  grid-template-columns:28px repeat(7,1fr);
  text-align:center;
  font-weight:bold;
  margin:5px 0;
}

.week-num {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:bold;
  color:#333;
  background:#e0e0e0;
  border-radius:4px;
}

/* Year view */
#yearViewContainer { margin-top:10px; }
.month-row { display:flex; align-items:center; margin-bottom:2px; }
.month-label { width:30px; font-size:10px; }
.week-square { width:8px; height:12px; margin-right:1px; }

/* Parent counts */
#countsContainer {
  margin-top:10px;
  text-align:center;
  font-weight:bold;
  font-size:14px;
}

@media(max-width:500px){
  .day { height:40px; }
}
</style>
</head>

<body>

<div class="container">

<h1>Kids Schedule</h1>

<div class="card">
  <div class="switch-container">
    <span class="switch-label">Lock editing</span>
    <label class="switch">
      <input type="checkbox" id="lockToggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <select id="parent">
    <option value="A">Natacha</option>
    <option value="B">Ludo</option>
  </select>
</div>

<div class="header">
<button onclick="prev()">◀</button>
<h2 id="monthLabel"></h2>
<button onclick="next()">▶</button>
</div>

<div class="weekday-row" id="weekdayRow"></div>
<div class="calendar" id="calendar"></div>

<h3 style="text-align:center">Year Overview</h3>
<div id="yearViewContainer"></div>

<div id="countsContainer">
  <span style="color:#ef4444;">Natacha: <span id="countA">0</span></span> | 
  <span style="color:#3b82f6;">Ludo: <span id="countB">0</span></span>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzUqw8bXqL6UkWepHJdYIZZ45dFsCpqxw",
  authDomain: "calendrier-enfants-49e66.firebaseapp.com",
  projectId: "calendrier-enfants-49e66",
  storageBucket: "calendrier-enfants-49e66.firebasestorage.app",
  messagingSenderId: "916870140761",
  appId: "1:916870140761:web:9293972d0eb51140287248"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const calendarId = location.hash.slice(1) || "default";
const ref = doc(db, "calendars", calendarId);

const parentSelect = document.getElementById("parent");
const calendarEl = document.getElementById("calendar");
const monthLabel = document.getElementById("monthLabel");
const weekdayRow = document.getElementById("weekdayRow");
const yearViewContainer = document.getElementById("yearViewContainer");
const lockToggle = document.getElementById("lockToggle");

const countAEl = document.getElementById("countA");
const countBEl = document.getElementById("countB");

let events = [];
let currentMonth = new Date();
let selecting = false;
let dragParent = null;
let lastTouchedDate = null;

const weekdays = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// Firestore sync
onSnapshot(ref, (docSnap)=>{
  if(docSnap.exists()){
    events = docSnap.data().events || [];
    renderMonth();
    renderYearView();
    updateCounts();
  }
});

function save(){
  setDoc(ref,{events},{merge:true});
}

// Navigation
window.prev = ()=>{
  currentMonth.setDate(1);
  currentMonth.setMonth(currentMonth.getMonth()-1);
  renderMonth();
};

window.next = ()=>{
  currentMonth.setDate(1);
  currentMonth.setMonth(currentMonth.getMonth()+1);
  renderMonth();
};

// Toggle logic
function toggleCell(date,parent){
  if(lockToggle.checked) return; // locked → no changes
  const i = events.findIndex(e=>e.date===date);
  if(i>=0){
    if(events[i].parent===parent) events.splice(i,1);
    else events[i].parent = parent;
  } else {
    events.push({date,parent});
  }
}

// ISO week number
function getWeekNumber(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date - yearStart) / 86400000) + 1)/7);
}

// Render month with week numbers
function renderMonth(){
  calendarEl.innerHTML="";
  weekdayRow.innerHTML="";

  const empty = document.createElement('div');
  weekdayRow.appendChild(empty);

  weekdays.forEach(d=>{
    const div=document.createElement('div');
    div.textContent=d;
    weekdayRow.appendChild(div);
  });

  const year=currentMonth.getFullYear();
  const month=currentMonth.getMonth();
  monthLabel.textContent=currentMonth.toLocaleString('default',{month:'long',year:'numeric'});

  const firstDay=new Date(year,month,1).getDay();
  const offset=(firstDay+6)%7;
  const days=new Date(year,month+1,0).getDate();

  let dayCounter = 1;
  const totalCells = offset + days;
  const totalRows = Math.ceil(totalCells / 7);

  for(let row=0; row<totalRows; row++){
    const monday = new Date(year, month, dayCounter - ((new Date(year, month, dayCounter).getDay()+6)%7));
    const weekDiv=document.createElement('div');
    weekDiv.className='week-num';
    weekDiv.textContent=getWeekNumber(monday);
    calendarEl.appendChild(weekDiv);

    for(let col=0; col<7; col++){
      const cellIndex = row*7 + col;
      if(cellIndex < offset || dayCounter > days){
        const emptyCell = document.createElement('div');
        calendarEl.appendChild(emptyCell);
      } else {
        const dateObj=new Date(year,month,dayCounter);
        const dateStr=formatDate(dateObj);
        calendarEl.appendChild(createDay(dateStr,dayCounter));
        dayCounter++;
      }
    }
  }

  updateCounts();
}

// Create day cell
function createDay(dateStr,label){
  const div=document.createElement('div');
  div.className="day";
  div.dataset.date=dateStr;

  const num=document.createElement('div');
  num.className="day-number";
  num.textContent=label;
  div.appendChild(num);

  paint(div,dateStr);

  const apply = (cell)=>{
    if(lockToggle.checked) return;
    if(!dragParent || !cell) return;
    const date = cell.dataset.date;
    if(lastTouchedDate === date) return;
    lastTouchedDate = date;
    toggleCell(date,dragParent);
    paint(cell,date);
    renderYearView();
    updateCounts();
  };

  div.addEventListener('mousedown',()=>{
    selecting=true;
    dragParent=parentSelect.value;
    lastTouchedDate=null;
    apply(div);
  });

  div.addEventListener('mouseenter',()=>{
    if(selecting) apply(div);
  });

  div.addEventListener('touchstart',(e)=>{
    selecting=true;
    dragParent=parentSelect.value;
    lastTouchedDate=null;
    apply(div);
    e.preventDefault();
  });

  div.addEventListener('touchmove',(e)=>{
    const t=e.touches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY)?.closest('.day');
    if(el) apply(el);
    e.preventDefault();
  });

  return div;
}

// End drag
document.addEventListener('mouseup',endDrag);
document.addEventListener('touchend',endDrag);

function endDrag(){
  if(selecting){
    selecting=false;
    dragParent=null;
    lastTouchedDate=null;
    save();
    renderMonth();
  }
}

// Paint cell color
function paint(cell,date){
  const e = events.find(ev=>ev.date===date);
  if(!e) cell.style.background='white';
  else cell.style.background = e.parent==='A'?'#ef4444':'#3b82f6';
}

// Year view
function renderYearView(){
  yearViewContainer.innerHTML='';
  const year=currentMonth.getFullYear();
  let date=new Date(year,0,1);
  const day=date.getDay();
  date.setDate(date.getDate()+((8-day)%7));

  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let currentMonthIndex=date.getMonth();
  let row=createMonthRow(months[currentMonthIndex]);

  for(let w=0;w<52;w++){
    const weekStart=new Date(date);
    let A=0,B=0;

    for(let i=0;i<7;i++){
      const d=new Date(weekStart);
      d.setDate(d.getDate()+i);
      const ds=formatDate(d);
      events.forEach(e=>{
        if(e.date===ds){
          if(e.parent==='A') A++;
          if(e.parent==='B') B++;
        }
      });
    }

    let color='#ccc';
    if(A>B && A>0) color='#ef4444';
    else if(B>A && B>0) color='#3b82f6';

    const sq=document.createElement('div');
    sq.className='week-square';
    sq.style.background=color;
    row.appendChild(sq);

    date.setDate(date.getDate()+7);

    if(date.getMonth()!==currentMonthIndex){
      yearViewContainer.appendChild(row);
      currentMonthIndex=date.getMonth();
      row=createMonthRow(months[currentMonthIndex]);
    }
  }

  yearViewContainer.appendChild(row);
}

// Month row for year view
function createMonthRow(name){
  const row=document.createElement('div');
  row.className='month-row';
  const label=document.createElement('div');
  label.className='month-label';
  label.textContent=name;
  row.appendChild(label);
  return row;
}

function formatDate(d){
  return d.toISOString().split('T')[0];
}

// Count days for each parent
function updateCounts(){
  let countA = 0;
  let countB = 0;
  events.forEach(e=>{
    if(e.parent==='A') countA++;
    if(e.parent==='B') countB++;
  });
  countAEl.textContent = countA;
  countBEl.textContent = countB;
}

// Initial render
renderMonth();
renderYearView();
updateCounts();

</script>
</body>
</html>
