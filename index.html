<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Schedule</title>
<style>
body { font-family: Arial,sans-serif; margin:0; padding:10px; background:#b0b0b0; }
.container { max-width:900px; margin:auto; }
h1 { text-align:center; font-size:1.8em; }
.card { background:white; padding:10px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.08); margin-bottom:10px; }
.row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
select { padding:6px; border-radius:8px; border:1px solid #ccc; width:100%; font-size:0.85em; }
.calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.day { width:100%; height:50px; border-radius:6px; font-size:11px; display:flex; justify-content:center; align-items:center; user-select:none; cursor:pointer; background:white; }
.day-number { position:absolute; top:2px; left:2px; font-weight:bold; font-size:0.8em; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.weekday-row { display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-weight:bold; margin-bottom:2px; font-size:0.8em; }
#yearViewContainer { display:flex; flex-direction:column; gap:2px; margin-bottom:20px; font-size:0.7em; }
.month-label { margin-bottom:2px; font-weight:bold; width:30px; flex-shrink:0; }
.week-square { width:10px; height:15px; margin-right:1px; display:inline-block; }
@media(max-width:500px){
  .day { height:40px; font-size:10px; }
  .day-number { font-size:0.7em; }
  .week-square { width:6px; height:10px; margin-right:0.5px; }
  .month-label { width:25px; font-size:0.65em; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Kids Schedule</h1>
  <div class="card">
    <div class="row">
      <select id="parent">
        <option value="A">Natacha</option>
        <option value="B">Ludo</option>
      </select>
    </div>
  </div>

  <div class="header">
    <button onclick="prev()">◀</button>
    <h2 id="monthLabel"></h2>
    <button onclick="next()">▶</button>
  </div>

  <div class="weekday-row" id="weekdayRow"></div>
  <div class="calendar" id="calendar"></div>

  <h3 style="text-align:center;margin-top:10px;">Year Overview</h3>
  <div id="yearViewContainer"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDzUqw8bXqL6UkWepHJdYIZZ45dFsCpqxw",
  authDomain: "calendrier-enfants-49e66.firebaseapp.com",
  projectId: "calendrier-enfants-49e66",
  storageBucket: "calendrier-enfants-49e66.firebasestorage.app",
  messagingSenderId: "916870140761",
  appId: "1:916870140761:web:9293972d0eb51140287248"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const calendarId = location.hash.slice(1) || "default";
const ref = doc(db, "calendars", calendarId);

const parentSelect = document.getElementById("parent");
const calendarEl = document.getElementById("calendar");
const monthLabel = document.getElementById("monthLabel");
const weekdayRow = document.getElementById("weekdayRow");
const yearViewContainer = document.getElementById("yearViewContainer");

let events = [];
let currentMonth = new Date();
let selecting = false;
let dragParent = null;

const weekdays=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// Firestore sync
onSnapshot(ref, (docSnap)=>{
  if(docSnap.exists()){
    events = docSnap.data().events || [];
    renderMonth();
    renderYearView();
  }
});

// Save to Firebase
function save(){ setDoc(ref,{events},{merge:true}); }

// Navigation
window.prev = function(){ currentMonth.setDate(1); currentMonth.setMonth(currentMonth.getMonth()-1); renderMonth(); renderYearView(); };
window.next = function(){ currentMonth.setDate(1); currentMonth.setMonth(currentMonth.getMonth()+1); renderMonth(); renderYearView(); };

// Toggle a cell
function toggleCell(date,parent){
  const idx = events.findIndex(e=>e.date===date);
  if(idx>=0){
    if(events[idx].parent===parent) events.splice(idx,1); // erase same parent
    else events[idx].parent=parent; // replace other parent
  } else events.push({date,parent}); // add new
}

// Render month
function renderMonth(){
  calendarEl.innerHTML="";
  weekdayRow.innerHTML="";
  weekdays.forEach(d=>{
    const div=document.createElement('div'); div.textContent=d;
    weekdayRow.appendChild(div);
  });

  const year=currentMonth.getFullYear();
  const month=currentMonth.getMonth();
  monthLabel.textContent=currentMonth.toLocaleString('default',{month:'long',year:'numeric'});

  const firstDay=new Date(year,month,1).getDay();
  const startOffset=(firstDay+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();

  for(let i=0;i<startOffset;i++) calendarEl.appendChild(document.createElement('div'));
  for(let day=1;day<=daysInMonth;day++){
    const dateObj=new Date(year,month,day);
    const dateStr=formatDate(dateObj);
    calendarEl.appendChild(createDayDiv(dateStr,day));
  }
}

// Create day cell
function createDayDiv(dateStr,label){
  const dayDiv=document.createElement('div');
  dayDiv.classList.add('day');
  dayDiv.dataset.date=dateStr;

  const dayNumber=document.createElement('div');
  dayNumber.classList.add('day-number');
  dayNumber.textContent=label;
  dayDiv.appendChild(dayNumber);

  const evData = events.find(e=>e.date===dateStr);
  if(evData){
    dayDiv.style.background = evData.parent==='A'?'#ef4444':'#3b82f6';
  }

  const applyCell = (cell)=>{
    const parent=dragParent;
    if(!parent) return;
    toggleCell(cell.dataset.date,parent);
    const e = events.find(ev=>ev.date===cell.dataset.date);
    if(e) cell.style.background = e.parent==='A'?'#ef4444':'#3b82f6';
    else cell.style.background='white';
    renderYearView();
  };

  // PC dragging
  dayDiv.addEventListener('mousedown',(ev)=>{ selecting=true; dragParent=parentSelect.value; applyCell(dayDiv); });
  dayDiv.addEventListener('mouseenter',(ev)=>{ if(selecting) applyCell(dayDiv); });

  // Mobile dragging
  dayDiv.addEventListener('touchstart',(ev)=>{ selecting=true; dragParent=parentSelect.value; applyCell(dayDiv); ev.preventDefault(); });
  dayDiv.addEventListener('touchmove',(ev)=>{
    const touch=ev.touches[0];
    const el=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.day');
    if(el) applyCell(el);
    ev.preventDefault();
  });

  document.addEventListener('mouseup',()=>{ if(selecting){ selecting=false; dragParent=null; save(); renderMonth(); } });
  document.addEventListener('touchend',()=>{ if(selecting){ selecting=false; dragParent=null; save(); renderMonth(); } });

  return dayDiv;
}

function formatDate(d){ return d.toISOString().split('T')[0]; }

// Year view
function renderYearView(){
  yearViewContainer.innerHTML='';
  const year=currentMonth.getFullYear();
  let date=new Date(year,0,1); 
  const day=date.getDay();
  date.setDate(date.getDate()+((8-day)%7));
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let currentMonthIndex=date.getMonth(); 
  let monthDiv=document.createElement('div'); monthDiv.style.display='flex'; monthDiv.style.alignItems='center';
  let monthLabelDiv=document.createElement('div'); monthLabelDiv.textContent=monthNames[currentMonthIndex]; monthLabelDiv.className='month-label'; monthDiv.appendChild(monthLabelDiv);
  for(let w=0;w<52;w++){
    const weekStart=new Date(date);
    let counts={A:0,B:0};
    for(let d=0;d<7;d++){
      const current=new Date(weekStart); current.setDate(current.getDate()+d); 
      const dateStr=formatDate(current);
      events.forEach(e=>{ if(e.date===dateStr) counts[e.parent]=(counts[e.parent]||0)+1; });
    }
    let color='#ccc'; 
    if(counts.A>counts.B && counts.A>0) color='#ef4444'; 
    else if(counts.B>counts.A && counts.B>0) color='#3b82f6'; 
    else if(counts.A===counts.B && counts.A>0) color='#f59e0b';
    const weekDiv=document.createElement('div'); weekDiv.className='week-square'; weekDiv.style.background=color;
    monthDiv.appendChild(weekDiv);
    date.setDate(date.getDate()+7);
    if(date.getMonth()!==currentMonthIndex){
      yearViewContainer.appendChild(monthDiv);
      currentMonthIndex=date.getMonth(); monthDiv=document.createElement('div'); monthDiv.style.display='flex'; monthDiv.style.alignItems='center';
      monthLabelDiv=document.createElement('div'); monthLabelDiv.textContent=monthNames[currentMonthIndex]; monthLabelDiv.className='month-label'; monthDiv.appendChild(monthLabelDiv);
    }
  }
  if(monthDiv.children.length>0) yearViewContainer.appendChild(monthDiv);
}

renderMonth();
renderYearView();
</script>
</body>
</html>
